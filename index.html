<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Husanboy Mansuraliyev | Software Engineer</title>
    <meta name="description" content="Personal website of Husanboy Mansuraliyev. Exploring the intersection of design and code.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050510;
            --accent-color: #7000ff;
            --secondary-accent: #00d2ff;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Background */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.15), transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(0, 210, 255, 0.15), transparent 40%);
            filter: blur(80px);
            animation: move-bg 20s ease-infinite alternate;
        }

        @keyframes move-bg {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
            z-index: 1;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fade-in-up 1s ease-out;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 30px;
            margin-bottom: 2rem;
            border: 2px solid var(--glass-border);
            background: linear-gradient(45deg, var(--accent-color), var(--secondary-accent));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            animation: hover-anim 3s ease-in-out infinite alternate;
        }

        @keyframes hover-anim {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #a2a2a2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .role {
            font-size: 1.1rem;
            color: var(--secondary-accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .bio {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .cta-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--text-primary);
            color: var(--bg-color);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .btn-secondary {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--glass-border);
            transform: translateY(-2px);
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 2.5rem; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    
    <div class="container">
        <div class="glass-card">
            <div class="profile-img">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>Husanboy</h1>
            <div class="role">Software Engineer</div>
            <p class="bio">
                Building digital experiences with a focus on clean code and interactive design. Passionate about machine learning, data engineering, and modern web technologies.
            </p>
            <div class="cta-container">
                <a href="https://github.com/mhusanboy" class="btn btn-primary" id="github-link">GitHub</a>
                <a href="mailto:contact@mhusanboy.com" class="btn btn-secondary" id="contact-link">Contact</a>
            </div>
        </div>
    </div>

    <script>
        // Subtle mouse follow effect
        document.addEventListener('mousemove', (e) => {
            const mesh = document.querySelector('.bg-mesh');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            mesh.style.background = `radial-gradient(circle at ${x * 100}% ${y * 100}%, rgba(112, 0, 255, 0.2), transparent 40%),
                                     radial-gradient(circle at ${80 - (x * 20)}% ${70 - (y * 20)}%, rgba(0, 210, 255, 0.2), transparent 40%)`;
        });
    </script>
</body>
</html>
